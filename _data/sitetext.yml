  resources:
    title: "Recursos de Aprendizaje"
    text: "Una colección de recursos de aprendizaje STEM"
    section: recurso
    closebutton: "Cerrar Recurso"

  organizations:
    title: "Organizaciones"
    heading: "Empoderando la Educación STEM"
    description: "Nuestra fundación se dedica a apoyar a organizaciones que empoderan a la próxima generación a través de una educación STEM moderna. Creemos que al proporcionar acceso a recursos de calidad, tutoría y experiencias de aprendizaje práctico, podemos ayudar a cerrar la brecha para las comunidades desatendidas y preparar a los estudiantes para las carreras del mañana.\n\nLas organizaciones que figuran a continuación comparten nuestro compromiso de fomentar la innovación, el pensamiento crítico y las habilidades de resolución de problemas. Desde iniciativas de codificación y programas de robótica hasta seguridad digital y estándares tecnológicos, estos socios están a la vanguardia de la transformación educativa.\n\nLe animamos a explorar el trabajo de cada organización para obtener más información sobre sus misiones específicas y el impacto que están teniendo en el ecosistema STEM. Su apoyo, ya sea a través de donaciones, voluntariado o defensa, juega un papel vital en el mantenimiento de estos programas esenciales y en la ampliación de su alcance a quienes más los necesitan.\n\nHemos compilado un directorio de organizaciones que apoyamos a continuación. ¡Haga clic en cualquier organización para ver su perfil dedicado y descubrir cómo puede contribuir a su causa!"

  opensource:
    title: "Código Abierto"
    heading: "Colaboración de código con la industria"
    description: "Los proyectos de código abierto proporcionan una plataforma invaluable para que las personas desarrollen y mejoren sus habilidades STEM. La participación en iniciativas de código abierto ofrece un entorno de aprendizaje práctico y colaborativo donde los entusiastas pueden contribuir a proyectos del mundo real. Uno de los aspectos clave es la transparencia del código fuente, lo que permite a los aspirantes a desarrolladores explorar y comprender cómo funcionan los sistemas complejos. Esta experiencia práctica fomenta una comprensión más profunda de los lenguajes de programación, algoritmos y arquitectura de software.\n\nLos proyectos de código abierto fomentan la resolución de problemas y el pensamiento crítico. Los colaboradores a menudo encuentran desafíos que requieren soluciones creativas, perfeccionando sus habilidades analíticas y su capacidad para solucionar problemas. La naturaleza colaborativa de estos proyectos promueve el trabajo en equipo, la comunicación y las habilidades de gestión de proyectos, que son cruciales en los campos STEM donde la colaboración es común.\n\nLas comunidades de código abierto también exponen a las personas a una amplia gama de tecnologías y herramientas. Los colaboradores pueden trabajar en proyectos relacionados con la ciencia de datos, la inteligencia artificial, la ciberseguridad o cualquier otra disciplina STEM, proporcionando exposición a un amplio espectro de aplicaciones. Esta exposición no solo ayuda a las personas a descubrir sus intereses dentro de STEM, sino que también las prepara para la naturaleza interdisciplinaria de muchas carreras STEM.\n\nHemos compilado una lista de proyectos populares de código abierto en la industria a continuación. ¡El botón Contribuir lo redirigirá a una página de contribución con las mejores prácticas sobre cómo comenzar!"

