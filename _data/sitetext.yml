en: &DEFAULT_EN
  marketplace:
    title: "Marketplace"
    text: "Apps and Games for a Modern Education"
    section: marketplace
    heading: "Empower Your Learning Journey"
    lead_text: "Welcome to the digital frontier of education. Explore our curated selection of tools, applications, and games designed to make STEM mastery engaging, accessible, and high-impact."

  open_source:
    title: "Open Source"
    heading: "Collaborate with Industry Leaders through Open Source"
    text: "Open source is the heartbeat of modern technological innovation. By participating in these projects, you're not just writing code—you're joining a global community dedicated to solving real-world challenges through transparency and collaboration."
    feature1_title: "Hands-on Mastery"
    feature1_text: "Dive deep into complex systems. Explore production-grade source code to master programming languages, sophisticated algorithms, and scalable software architectures."
    feature2_title: "Collaborative Growth"
    feature2_text: "Hone your critical thinking and project management skills. Work alongside experienced mentors to troubleshoot issues and deliver creative, high-impact solutions."
    feature3_title: "Future-Ready Skills"
    feature3_text: "Gain exposure to cutting-edge fields like Artificial Intelligence, Cybersecurity, and Data Science, preparing you for the interdisciplinary demands of tomorrow's STEM careers."
    footer_text: "Explore our curated selection of industry-leading open source projects below. Click <strong>Contribute</strong> to find guided pathways and best practices for making your first impact."

  organizations_page:
    title: "Organizations"
    heading: "Partnering for a Brighter STEM Future"
    text: "We are proud to stand alongside world-class organizations dedicated to democratizing STEM education. Together, we are breaking down barriers, fostering innovation, and equipping the next generation with the tools they need to lead in a technology-driven world."
    feature1_title: "Collaborative Impact"
    feature1_text: "By uniting coding initiatives, robotics programs, and digital safety advocates, we create a robust ecosystem of support for learners everywhere."
    feature2_title: "Standardizing Excellence"
    feature2_text: "Our partners are at the forefront of establishing technology standards and safety protocols that ensure a secure and effective learning environment."
    footer_text: "Explore our directory of partner organizations below. Visit their profiles to learn more about their unique missions and discover how you can contribute to their vital work through donation, advocacy, or volunteering."

  glossary_page:
    title: "Glossaries"
    heading: "Master the Language of Innovation"
    text: "Unlock the complexities of the modern tech landscape. Our curated glossaries and cheatsheets bridge the gap between technical jargon and practical understanding, empowering you to communicate effectively and master the latest STEM technologies."
    feature1_title: "Industry Jargon"
    feature1_text: "Navigate specialized vocabularies used by professionals in coding, AI, and engineering."
    feature2_title: "Clear Concepts"
    feature2_text: "Break down intricate processes into easy-to-understand definitions and summaries."
    feature3_title: "Fluent Collaboration"
    feature3_text: "Build the confidence to contribute to technical discussions and professional teams."

