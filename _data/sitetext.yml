        icon: fas fa-laptop
      - title: "Ingeniería"
        desc: "Colabora con aficionados capacitados en robótica, microcontroladores, impresión 3D y otros proyectos."
        icon: fas fa-cogs
      - title: "Seguridad Digital"
        desc: "Más de una década de defensores de tecnología experimentados expertos en actividades en línea seguras."
