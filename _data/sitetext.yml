  clients:
    section: clients
    max-height: 100px
    horizontal-scrolling: "" #"yes/no"
    list:
      - title: "functions.io"
        url: https://functions.io
        logo: assets/img/clients/functionsio.png
      - title: "hey"
        url: https://www.heyrj.com/
        logo: assets/img/clients/hey.png            
      - title: "google"
        url: https://www.google.com/nonprofits/offerings/workspace/
        logo: assets/img/clients/google.png
  donations:
    title: "DONATIONS"
    text: "Thank you for your support"
    section: donations
    list:
      - title: PayPal
        image: assets/img/donations/1.png
        address: "<a href='https://paypal.me/digitaledsafety/5?country.x=US&amp;locale.x=en_US'>Donate on PayPal.me</a>"

  contact:
    title: "Contact Us"
    text: "<a href='mailto:hello@digitaleducationsafety.org'>Email</a> or call <a href='tel:+18336925477'>+1-833-692-5477</a>"
    section: contact
    name: "Name*"
    name-validation: "Please enter your name."
    email: "Email*"
    email-validation: "Please enter your email address."
    phone: "Phone Number"
    phone-validation: "Please enter your phone number."
    message: "Message*"
    message-validation: "Please enter a message."
    subject: "Contact Form Submission"
    submit: "Send Message"

  footer:
    legal: "Privacy Policy"
    terms: "Terms"
    social:
      - url: https://www.youtube.com/@digitaledsafety
        icon: "fab fa-youtube"       
      - url: https://x.com/digitaledsafety
        icon: "fab fa-twitter"    
      - url: https://github.com/digitaledsafety
        icon: "fab fa-github"        
      - url: https://facebook.com/digitaledsafety
        icon: "fab fa-facebook-f"
      - url: https://discord.gg/5tc2DfUZVe
        icon: "fab fa-discord"        
