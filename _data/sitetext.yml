es: &DEFAULT_ES
  marketplace:
    title: "Mercado"
    text: "Aplicaciones y Juegos para una Educación Moderna"
    section: mercado
    heading: "Potencie su Viaje de Aprendizaje"
    lead_text: "Bienvenido a la frontera digital de la educación. Explore nuestra selección curada de herramientas, aplicaciones y juegos diseñados para hacer que el dominio de STEM sea atractivo, accesible y de alto impacto."

  open_source:
    title: "Código Abierto"
    heading: "Colabore con Líderes de la Industria a través del Código Abierto"
    text: "El código abierto es el latido del corazón de la innovación tecnológica moderna. Al participar en estos proyectos, no solo está escribiendo código, se está uniendo a una comunidad global dedicada a resolver desafíos del mundo real a través de la transparencia y la colaboración."
    feature1_title: "Maestría Práctica"
    feature1_text: "Sumérjase en sistemas complejos. Explore el código fuente de grado de producción para dominar lenguajes de programación, algoritmos sofisticados y arquitecturas de software escalables."
    feature2_title: "Crecimiento Colaborativo"
    feature2_text: "Perfeccione su pensamiento crítico y sus habilidades de gestión de proyectos. Trabaje junto a mentores experimentados para solucionar problemas y ofrecer soluciones creativas y de alto impacto."
    feature3_title: "Habilidades Listas para el Futuro"
    feature3_text: "Obtenga exposición a campos de vanguardia como Inteligencia Artificial, Ciberseguridad y Ciencia de Datos, preparándose para las demandas interdisciplinarias de las carreras STEM del mañana."
    footer_text: "Explore nuestra selección curada de proyectos de código abierto líderes en la industria a continuación. Haga clic en <strong>Contribuir</strong> para encontrar caminos guiados y mejores prácticas para lograr su primer impacto."

  organizations_page:
    title: "Organizaciones"
    heading: "Asociándonos para un Futuro STEM más Brillante"
    text: "Estamos orgullosos de estar junto a organizaciones de clase mundial dedicadas a democratizar la educación STEM. Juntos, estamos rompiendo barreras, fomentando la innovación y equipando a la próxima generación con las herramientas que necesitan para liderar en un mundo impulsado por la tecnología."
    feature1_title: "Impacto Colaborativo"
    feature1_text: "Al unir iniciativas de codificación, programas de robótica y defensores de la seguridad digital, creamos un ecosistema robusto de apoyo para los estudiantes en todas partes."
    feature2_title: "Estandarización de la Excelencia"
    feature2_text: "Nuestros socios están a la vanguardia del establecimiento de estándares tecnológicos y protocolos de seguridad que garantizan un entorno de aprendizaje seguro y eficaz."
    footer_text: "Explore nuestro directorio de organizaciones asociadas a continuación. Visite sus perfiles para obtener más información sobre sus misiones únicas y descubra cómo puede contribuir a su trabajo vital a través de donaciones, promoción o voluntariado."

  glossary_page:
    title: "Glosarios"
