  organizations:
    title: "Organizations"
    heading: "Empowering STEM Education"
    description: "Our foundation is dedicated to supporting organizations that empower the next generation through modern STEM education. We believe that by providing access to quality resources, mentorship, and hands-on learning experiences, we can help bridge the gap for under-served communities and prepare students for the careers of tomorrow.\n\nThe organizations listed below share our commitment to fostering innovation, critical thinking, and problem-solving skills. From coding initiatives and robotics programs to digital safety and technology standards, these partners are at the forefront of educational transformation.\n\nWe encourage you to explore the work of each organization to learn more about their specific missions and the impact they are making in the STEM ecosystem. Your support, whether through donations, volunteering, or advocacy, plays a vital role in sustaining these essential programs and expanding their reach to those who need them most.\n\nWe've compiled a directory of organizations we support below. Click on any organization to view their dedicated profile and find out how you can contribute to their cause!"

  opensource:
    title: "Open Source"
    heading: "Code collaboration with industry"
    description: "Open source projects provide an invaluable platform for individuals to develop and enhance their STEM skills. Participation in open source initiatives offers a practical and collaborative learning environment where enthusiasts can contribute to real-world projects. One of the key aspects is the transparency of the source code, allowing aspiring developers to explore and understand how complex systems function. This hands-on experience fosters a deeper comprehension of programming languages, algorithms, and software architecture.\n\nOpen source projects encourage problem-solving and critical thinking. Contributors often encounter challenges that require creative solutions, honing their analytical skills and ability to troubleshoot issues. The collaborative nature of these projects promotes teamwork, communication, and project management skills, which are crucial in STEM fields where collaboration is common.\n\nOpen source communities also expose individuals to a diverse range of technologies and tools. Contributors may work on projects related to data science, artificial intelligence, cybersecurity, or any other STEM discipline, providing exposure to a broad spectrum of applications. This exposure not only helps individuals discover their interests within STEM but also prepares them for the interdisciplinary nature of many STEM careers.\n\nWe've compiled a list of popular open source projects in industry below. The Contribute button will redirect you to a contribution page with best practices on how to get started!"

