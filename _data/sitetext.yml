    text: "Desbloquee las complejidades del panorama tecnológico moderno. Nuestros glosarios y hojas de trucos curados cierran la brecha entre la jerga técnica y la comprensión práctica, capacitándolo para comunicarse de manera efectiva y dominar las últimas tecnologías STEM."
    feature1_title: "Jerga de la Industria"
    feature1_text: "Navegue por vocabularios especializados utilizados por profesionales en codificación, IA e ingeniería."
    feature2_title: "Conceptos Claros"
