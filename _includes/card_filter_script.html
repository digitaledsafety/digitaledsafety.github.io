<script>
  /**
   * Shared card filtering and population logic.
   * Expects a global `cardData` array and a `getCardHtml(cardObj)` function.
   * Optional global `window.defaultFilter` for initial selection if no hash is present.
   */

  function generateFilters(data, initialFilter) {
    const cardFiltersContainer = document.getElementById('card-filters');
    if (!cardFiltersContainer) return;

    cardFiltersContainer.innerHTML = '';
    const fs = [];
    data.forEach(cardObj => {
      if (cardObj.tags && Array.isArray(cardObj.tags)) {
        cardObj.tags.forEach(cardTag => {
          if (cardTag && !fs.includes(cardTag)) {
            fs.push(cardTag);
          }
        });
      } else if (cardObj.tags && typeof cardObj.tags === 'string') {
        cardObj.tags.split(',').forEach(tag => {
          const trimmed = tag.trim();
          if (trimmed && !fs.includes(trimmed)) {
            fs.push(trimmed);
          }
        });
      }
    });

    const filtersHtml = fs.sort().map(f => {
      const isChecked = (f === initialFilter) ? 'checked' : '';
      return `
        <li class="pl-2">
          <div class="form-check">
            <input type="checkbox" ${isChecked} class="form-check-input" id="${f}">
            <label class="form-check-label" for="${f}">${f}</label>
          </div>
        </li>
      `;
    }).join('');
    cardFiltersContainer.innerHTML = filtersHtml;

    // Add event listeners to checkboxes
    cardFiltersContainer.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', filterCards);
    });
  }

  function populateCards(data) {
    const cardContainer = document.getElementById('card-container');
    if (!cardContainer) return;

    const cardsHtml = data.map(cardObj => {
      if (typeof getCardHtml === 'function') {
        return getCardHtml(cardObj);
      }
      return '';
    }).join('');
    cardContainer.innerHTML = cardsHtml;
  }

  function filterCards() {
    const searchTerm = document.getElementById('card-search') ? document.getElementById('card-search').value.toLowerCase() : '';
    const selectedFilters = [];
    document.querySelectorAll('#card-filters input[type="checkbox"]:checked').forEach(cb => {
      selectedFilters.push(cb.id);
    });

    const filteredData = cardData.filter(cardObj => {
      // Filter by tags
      let cardTags = [];
      if (Array.isArray(cardObj.tags)) {
        cardTags = cardObj.tags;
      } else if (typeof cardObj.tags === 'string') {
        cardTags = cardObj.tags.split(',').map(t => t.trim());
      }

      const matchesFilter = selectedFilters.length === 0 || cardTags.some(tag => selectedFilters.includes(tag));

      // Filter by search term
      const matchesSearch = !searchTerm ||
        (cardObj.title && cardObj.title.toLowerCase().includes(searchTerm)) ||
        (cardObj.description && cardObj.description.toLowerCase().includes(searchTerm)) ||
        (cardObj.subtitle && cardObj.subtitle.toLowerCase().includes(searchTerm)) ||
        cardTags.some(tag => tag.toLowerCase().includes(searchTerm));

      return matchesFilter && matchesSearch;
    });

    populateCards(filteredData);

    const noResultsMsg = document.getElementById('no-results-message');
    if (noResultsMsg) {
      noResultsMsg.style.display = filteredData.length === 0 ? 'block' : 'none';
    }
  }

  window.addEventListener('load', function () {
    let initialFilter = window.location.hash ? decodeURIComponent(window.location.hash.substring(1)) : (window.defaultFilter || null);

    if (typeof generateFilters === 'function') {
      generateFilters(cardData, initialFilter);
    }

    const searchInput = document.getElementById('card-search');
    if (searchInput) {
      searchInput.addEventListener('input', filterCards);
    }

    filterCards();
  });

  window.addEventListener('hashchange', function() {
    const newHash = decodeURIComponent(window.location.hash.substring(1));
    if (newHash) {
      document.querySelectorAll('#card-filters input[type="checkbox"]').forEach(cb => {
        cb.checked = false;
      });
      const checkbox = document.getElementById(newHash);
      if (checkbox) {
        checkbox.checked = true;
        filterCards();
      }
    }
  });
</script>
