<script>
    document.addEventListener('DOMContentLoaded', function() {
        const tagButtons = document.querySelectorAll('.tag-filter');
        const cards = document.querySelectorAll('.filterable-card');
        const searchInput = document.getElementById('collection-search');
        const noResultsMessage = document.getElementById('no-results-message');
        const cardGrid = document.getElementById('card-grid');

        let activeTag = 'all';
        let searchQuery = '';

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function filterCards() {
            let visibleCount = 0;
            const query = searchQuery.toLowerCase();

            // Clear current grid content if we're using dynamic rendering
            // For now, we'll just toggle visibility on existing cards for better performance
            // but we use cardData for the source of truth in search.

            cards.forEach((card) => {
                const index = parseInt(card.getAttribute('data-index'));
                const data = cardData[index];
                const tags = data.tags || [];

                const matchesTag = activeTag === 'all' || tags.includes(activeTag);

                const matchesSearch = !query ||
                    data.title.toLowerCase().includes(query) ||
                    data.description.toLowerCase().includes(query) ||
                    tags.some(tag => tag.toLowerCase().includes(query));

                if (matchesTag && matchesSearch) {
                    card.classList.remove('d-none');
                    card.classList.add('d-flex');
                    visibleCount++;
                } else {
                    card.classList.remove('d-flex');
                    card.classList.add('d-none');
                }
            });

            if (visibleCount === 0) {
                noResultsMessage.classList.remove('d-none');
            } else {
                noResultsMessage.classList.add('d-none');
            }
        }

        tagButtons.forEach(button => {
            button.addEventListener('click', () => {
                tagButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                activeTag = button.getAttribute('data-tag');
                filterCards();
            });
        });

        if (searchInput) {
            searchInput.addEventListener('input', debounce((e) => {
                searchQuery = e.target.value;
                filterCards();
            }, 300));
        }
    });
</script>
