<script>
  /**
   * Shared card filtering and population logic.
   * Expects a global `cardData` array and a `getCardHtml(cardObj)` function.
   * Optional global `window.defaultFilter` for initial selection if no hash is present.
   */

  function generateFilters(data, initialFilter) {
    const cardFiltersContainer = document.getElementById('card-filters');
    if (!cardFiltersContainer) return;

    while (cardFiltersContainer.firstChild) {
      cardFiltersContainer.removeChild(cardFiltersContainer.firstChild);
    }
    const fs = [];
    data.forEach(cardObj => {
      if (cardObj.tags && Array.isArray(cardObj.tags)) {
        cardObj.tags.forEach(cardTag => {
          if (cardTag && !fs.includes(cardTag)) {
            fs.push(cardTag);
          }
        });
      }
    });

    fs.sort().forEach(f => {
      const isChecked = (f === initialFilter);
      const li = document.createElement('li');
      li.className = 'pl-2';

      const div = document.createElement('div');
      div.className = 'form-check';
      li.appendChild(div);

      const input = document.createElement('input');
      input.type = 'checkbox';
      input.className = 'form-check-input';
      input.id = f;
      if (isChecked) input.checked = true;
      input.addEventListener('change', filterCards);
      div.appendChild(input);

      const label = document.createElement('label');
      label.className = 'form-check-label';
      label.setAttribute('for', f);
      label.textContent = f;
      div.appendChild(label);

      cardFiltersContainer.appendChild(li);
    });
  }

  function populateCards() {
    const cardContainer = document.getElementById('card-container');
    if (!cardContainer) return;

    let initialFilter = window.location.hash ? decodeURIComponent(window.location.hash.substring(1)) : (window.defaultFilter || null);

    if (typeof generateFilters === 'function') {
      generateFilters(cardData, initialFilter);
    }

    while (cardContainer.firstChild) {
      cardContainer.removeChild(cardContainer.firstChild);
    }

    cardData.forEach(cardObj => {
      if (typeof getCardHtml === 'function') {
        const result = getCardHtml(cardObj);
        if (result instanceof HTMLElement) {
          cardContainer.appendChild(result);
        }
      }
    });
  }

  function filterCards() {
    const selectedFilters = [];
    document.querySelectorAll('#card-filters input[type="checkbox"]:checked').forEach(cb => {
      selectedFilters.push(cb.id);
    });

    document.querySelectorAll('.filterable-card').forEach(card => {
      let filters = card.getAttribute('data-filters');
      try {
        // Try to parse as JSON if it looks like an array
        if (filters && (filters.startsWith('[') || filters.startsWith('{'))) {
          filters = JSON.parse(filters);
        } else if (filters) {
          filters = filters.split(',');
        }
      } catch (e) {
        if (filters) {
          filters = filters.split(',');
        }
      }
      filters = filters || [];

      let showCard = false;
      if (selectedFilters.length === 0) {
        showCard = true;
      } else {
        showCard = filters.some(filter => selectedFilters.includes(filter));
      }
      if (showCard) {
        card.classList.remove('d-none');
      } else {
        card.classList.add('d-none');
      }
    });
  }

  window.addEventListener('load', function () {
    populateCards();
    filterCards();
  });

  window.addEventListener('hashchange', function() {
    const newHash = decodeURIComponent(window.location.hash.substring(1));
    if (newHash) {
      document.querySelectorAll('#card-filters input[type="checkbox"]').forEach(cb => {
        cb.checked = false;
      });
      const checkbox = document.getElementById(newHash);
      if (checkbox) {
        checkbox.checked = true;
        filterCards();
      }
    }
  });
</script>
