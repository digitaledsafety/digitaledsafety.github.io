<div id="paypal-button-container-{{ include.dom_id }}"></div>
<script>
  (function() {
    var renderButton = function() {
      if (window.paypal) {
        paypal.Buttons({
          style: {
            layout: 'vertical',
            color:  'gold',
            shape:  'rect',
            label:  'paypal'
          },
          createOrder: function(data, actions) {
            return actions.order.create({
              purchase_units: [{
                amount: {
                  currency_code: '{{ site.paypal_currency | default: "USD" }}',
                  value: '{{ include.price }}'
                },
                description: '{{ include.title | escape }}'
              }]
            });
          },
          onApprove: function(data, actions) {
            return actions.order.capture().then(function(details) {
              alert('Transaction completed by ' + details.payer.name.given_name + '!');
            });
          },
          onError: function(err) {
            console.error('PayPal Error for {{ include.dom_id }}:', err);
          }
        }).render('#paypal-button-container-{{ include.dom_id }}');
      } else {
        setTimeout(renderButton, 500);
      }
    };
    renderButton();
  })();
</script>
