<section class="page-section bg-light" id="education">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="section-heading text-uppercase">{{ include.title | default: "Learning in Action" }}</h2>
        <h3 class="section-subheading text-muted">{{ include.subtitle | default: "Explore our latest educational content and foundation projects." }}</h3>
      </div>
    </div>
    <div class="row">
      {% for video_id in include.video_ids %}
      <div class="col-md-6 mb-4">
        <div class="embed-responsive embed-responsive-16by9">
          <iframe class="embed-responsive-item" src="https://www.youtube.com/embed/{{ video_id }}" allowfullscreen></iframe>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
