<style>
  .marketplace-card {
    border: none;
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    overflow: hidden;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: #fff;
  }
  .marketplace-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  }
  .marketplace-img-container {
    position: relative;
    width: 100%;
    padding-top: 60%; /* 5:3 Aspect Ratio */
    overflow: hidden;
    background: #f8f9fa;
  }
  .marketplace-img-container img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .marketplace-body {
    padding: 1.5rem;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
  }
  .marketplace-title {
    font-weight: 700;
    font-size: 1.25rem;
    margin-bottom: 0.5rem;
    color: #333;
  }
  .marketplace-subtitle {
    font-size: 0.9rem;
    color: #666;
    margin-bottom: 1rem;
    flex-grow: 1;
  }
  .marketplace-meta {
    background: #f8f9fa;
    border-radius: 10px;
    padding: 0.75rem;
    margin-bottom: 1rem;
  }
  .meta-item {
    display: flex;
    align-items: center;
    font-size: 0.8rem;
    color: #555;
    margin-bottom: 0.25rem;
  }
  .meta-item:last-child {
    margin-bottom: 0;
  }
  .meta-item i {
    width: 18px;
    margin-right: 8px;
    color: #fed136; /* Agency Theme Primary */
    text-align: center;
  }
  .meta-label {
    font-weight: 600;
    margin-right: 4px;
    color: #333;
  }
  .marketplace-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: auto;
  }
  .btn-install {
    border-radius: 50px;
    padding: 0.5rem 1.5rem;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.8rem;
    transition: all 0.2s;
  }
  .platform-badge {
    font-size: 0.7rem;
    padding: 0.3rem 0.6rem;
    border-radius: 10px;
    background: #e9ecef;
    color: #495057;
    font-weight: 600;
    text-transform: uppercase;
  }
  .service-badge {
    font-size: 0.7rem;
    padding: 0.3rem 0.6rem;
    border-radius: 10px;
    background: #fed136;
    color: #fff;
    font-weight: 600;
    text-transform: uppercase;
  }
  .title-case {
    text-transform: capitalize;
  }
</style>

<div class="row mb-4">
  <div class="col-md-6 mt-3">
    <div class="input-group">
      <div class="input-group-prepend">
        <span class="input-group-text"><i class="fa fa-search"></i></span>
      </div>
      <input type="text" id="marketplace-search" class="form-control" placeholder="Search...">
    </div>
  </div>
  <div class="col-md-3 mt-3">
    <select id="service-filter" class="form-control">
      <option value="all">All Services</option>
      <option value="Entrepreneurship">Entrepreneurship</option>
      <option value="Engineering">Engineering</option>
      <option value="Digital Safety">Digital Safety</option>
    </select>
  </div>
  <div class="col-md-3 mt-3">
    <select id="sort-by" class="form-control">
      <option value="recent">Recently Added</option>
      <option value="alpha">Alphabetical</option>
    </select>
  </div>
</div>

<div class="row" id="marketplace-container">
  <!-- Marketplace items will be injected here -->
</div>

<script>
  const programsMap = {
    {% for p in site.programs %}
    "{{ p.id | default: p.url | split: "/" | last | replace: ".html", "" }}": {
      "title": {{ p.title | jsonify }},
      "service": {{ p.caption.subtitle | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  };
  const marketplaceData = [
    {% for item in site.marketplace %}
    {
      "title": {{ item.title | jsonify }},
      "subtitle": {{ item.subtitle | jsonify }},
      "image": {{ item.image | jsonify }},
      "link": {{ item.link | jsonify }},
      "platform": {{ item.platform | default: "pwa" | jsonify }},
      "categories": {{ item.categories | jsonify }},
      "program": {{ item.program | jsonify }},
      "service": (programsMap[{{ item.program | jsonify }}] || {}).service || "N/A",
      "date": {{ item.date | jsonify }},
      "tags": {{ item.tags | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  function renderMarketplace(data) {
    const container = document.getElementById('marketplace-container');
    container.innerHTML = '';

    data.forEach(item => {
      let btnText = 'Launch';
      let icon = 'fa-globe';

      if (item.platform === 'android') {
        btnText = 'Download';
        icon = 'fa-android';
      } else if (item.platform === 'github') {
        btnText = 'Build';
        icon = 'fa-github';
      }

      let serviceIcon = 'fa-laptop';
      if (item.service === 'Entrepreneurship') {
        serviceIcon = 'fa-laptop';
      } else if (item.service === 'Engineering') {
        serviceIcon = 'fa-cogs';
      } else if (item.service === 'Digital Safety') {
        serviceIcon = 'fa-user-shield';
      }

      const html = `
        <div class="col-lg-4 col-md-6 mb-4 marketplace-item-wrapper">
          <div class="card marketplace-card">
            <div class="marketplace-img-container">
              <img src="${item.image}" alt="${item.title}">
            </div>
            <div class="marketplace-body">
              <div class="d-flex justify-content-between align-items-start">
                <h5 class="marketplace-title mr-2">${item.title}</h5>
                <div class="d-flex flex-column align-items-end flex-shrink-0">
                  <span class="service-badge">${item.service}</span>
                </div>
              </div>
              <p class="marketplace-subtitle">${item.subtitle}</p>

              <div class="marketplace-meta">
                <div class="meta-item">
                  <i class="fa fa-laptop"></i>
                  <span class="meta-label">Platform:</span><span class="title-case"> ${item.platform} <span>
                </div>
                <div class="meta-item">
                  <i class="fa fa-tag"></i>
                  <span class="meta-label">Category:</span><span class="title-case">  ${Array.isArray(item.categories) ? item.categories.join(", ") : (item.categories || "N/A")} </span>
                </div>
                <div class="meta-item">
                  <i class="fa ${serviceIcon}"></i>
                  <span class="meta-label">Service:</span><span class="title-case">  ${item.service.toLowerCase()} <span>
                </div>
              </div>

              <div class="marketplace-footer">
                <a href="${item.link}" target="_blank" class="btn btn-primary btn-install">${btnText}</a>
              </div>
            </div>
          </div>
        </div>
      `;
      container.innerHTML += html;
    });
  }

  function filterAndSort() {
    const searchTerm = document.getElementById('marketplace-search').value.toLowerCase();
    const service = document.getElementById('service-filter').value;
    const sortBy = document.getElementById('sort-by').value;

    let filtered = marketplaceData.filter(item => {
      const matchesSearch = (item.title && item.title.toLowerCase().includes(searchTerm)) ||
                           (item.subtitle && item.subtitle.toLowerCase().includes(searchTerm)) ||
                           (item.platform && item.platform.toLowerCase().includes(searchTerm)) ||
                           (Array.isArray(item.categories) && item.categories.some(c => c && c.toLowerCase().includes(searchTerm))) ||
                           (Array.isArray(item.tags) && item.tags.some(t => t && t.toLowerCase().includes(searchTerm)));
      const matchesService = service === 'all' || item.service === service;
      return matchesSearch && matchesService;
    });

    if (sortBy === 'alpha') {
      filtered.sort((a, b) => a.title.localeCompare(b.title));
    } else {
      filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    renderMarketplace(filtered);
  }

  document.getElementById('marketplace-search').addEventListener('input', filterAndSort);
  document.getElementById('service-filter').addEventListener('change', filterAndSort);
  document.getElementById('sort-by').addEventListener('change', filterAndSort);

  // Initial render
  filterAndSort();
</script>
