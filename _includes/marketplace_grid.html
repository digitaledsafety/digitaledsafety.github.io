<style>
  .marketplace-card {
    border: none !important;
    border-radius: 20px !important;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important;
  }
  .marketplace-meta {
    background: #f8f9fa;
    border-radius: 10px;
    padding: 0.75rem;
    margin-bottom: 1rem;
  }
  .meta-item {
    display: flex;
    align-items: center;
    font-size: 0.8rem;
    color: #555;
    margin-bottom: 0.25rem;
  }
  .meta-item:last-child {
    margin-bottom: 0;
  }
  .meta-item i {
    width: 18px;
    margin-right: 8px;
    color: #fed136; /* Agency Theme Primary */
    text-align: center;
  }
  .meta-label {
    font-weight: 600;
    margin-right: 4px;
    color: #333;
  }
  .btn-install {
    border-radius: 50px;
    padding: 0.5rem 1.5rem;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.8rem;
    transition: all 0.2s;
  }
  .service-badge {
    font-size: 0.7rem;
    padding: 0.3rem 0.6rem;
    border-radius: 10px;
    background: #fed136;
    color: #fff;
    font-weight: 600;
    text-transform: uppercase;
  }
  .title-case {
    text-transform: capitalize;
  }
  #no-results-message {
    width: 100%;
    padding: 2rem;
    text-align: center;
    background: #f8f9fa;
    border-radius: 10px;
    margin: 1rem 0;
  }
</style>

{% assign ui_data = site.data.sitetext[site.locale].marketplace_ui %}

{% include embed/paypal_sdk.html %}
{% include donation_modal.html %}

<div class="row mb-4">
  <div class="col-md-6 mt-3">
    <div class="input-group">
      <div class="input-group-prepend">
        <span class="input-group-text"><i class="fas fa-search" aria-hidden="true"></i></span>
      </div>
      <input type="text" id="marketplace-search" class="form-control" placeholder="{{ ui_data.search_placeholder | default: "Search..." }}" aria-label="{{ ui_data.search_placeholder | default: "Search marketplace items" }}">
    </div>
  </div>
  <div class="col-md-3 mt-3">
    <select id="service-filter" class="form-control" aria-label="{{ ui_data.service_label | default: "Filter by service" }}">
      <option value="all">{{ ui_data.all_services | default: "All Services" }}</option>
      {% for service in site.services %}
      <option value="{{ service.title }}">{{ service.title }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-3 mt-3">
    <select id="sort-by" class="form-control" aria-label="{{ ui_data.sort_label | default: "Sort marketplace items" }}">
      <option value="recent">{{ ui_data.sort_recent | default: "Recently Added" }}</option>
      <option value="alpha">{{ ui_data.sort_alpha | default: "Alphabetical" }}</option>
    </select>
  </div>
</div>

<div class="row mb-4">
  <div class="col-12 text-right">
    <button id="clear-filters" class="btn btn-sm btn-outline-secondary" style="border-radius: 20px; font-size: 0.75rem;" aria-label="{{ ui_data.clear_filters_aria | default: 'Clear all search and filter criteria' }}">
      <i class="fas fa-times-circle mr-1"></i> {{ ui_data.clear_filters | default: 'Clear Filters' }}
    </button>
  </div>
</div>

<div id="no-results-message" role="status" style="display: none;">
  <p class="text-muted">{{ ui_data.no_results | default: "No results found matching your search." }}</p>
</div>

<div class="row" id="marketplace-container" role="list">
  <!-- Marketplace items will be injected here -->
</div>

{% include render_grid_script.html %}

<script>
  if (typeof debounce !== 'function') {
    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }
  }

  const uiStrings = {
    platform: {{ ui_data.platform_label | default: "Platform:" | jsonify }},
    category: {{ ui_data.category_label | default: "Category:" | jsonify }},
    service: {{ ui_data.service_label | default: "Service:" | jsonify }},
    launch: {{ ui_data.launch_btn | default: "Launch" | jsonify }},
    download: {{ ui_data.download_btn | default: "Download" | jsonify }},
    build: {{ ui_data.build_btn | default: "Build" | jsonify }},
    webapp: {{ ui_data.webapp | default: "Web App" | jsonify }},
    fallback: {{ ui_data.fallback | default: "N/A" | jsonify }},
    viewDetails: {{ site.data.sitetext[site.locale].collection_ui.view_details | default: "View Details" | jsonify }},
    share: {{ site.data.sitetext[site.locale].collection_ui.share | default: "Share" | jsonify }},
    copied: {{ site.data.sitetext[site.locale].collection_ui.copied | default: "Copied!" | jsonify }}
  };
  const serviceIcons = {
    {% for service in site.services %}
    {{ service.title | jsonify }}: {{ service.icon | jsonify }}{% unless forloop.last %},{% endunless %}
    {% endfor %}
  };
  const marketplaceData = [
    {% for item in site.marketplace %}
    {
      "title": {{ item.title | jsonify }},
      "subtitle": {{ item.subtitle | jsonify }},
      "image": {{ item.image | jsonify }},
      "link": {{ item.link | jsonify }},
      "url": {{ item.url | relative_url | jsonify }},
      "platform": {{ item.platform | default: "pwa" | jsonify }},
      "categories": {{ item.categories | jsonify }},
      "program": {{ item.program | jsonify }},
      "programTitle": {% assign program_title = "" %}{% for p in site.programs %}{% assign pid = p.id | split: "/" | last | split: "." | first | plus: 0 %}{% if pid == item.program %}{% assign program_title = p.title %}{% break %}{% endif %}{% endfor %}{{ program_title | jsonify }},
      "service": {{ item.service | default: "N/A" | jsonify }},
      "date": {{ item.date | jsonify }},
      "tags": {{ item.tags | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  function createMetaItem(iconClass, label, value) {
    const item = document.createElement('div');
    item.classList.add('meta-item');

    const icon = document.createElement('i');
    iconClass.split(' ').forEach(cls => icon.classList.add(cls));
    icon.setAttribute('aria-hidden', 'true');
    item.appendChild(icon);

    const labelSpan = document.createElement('span');
    labelSpan.classList.add('meta-label');
    labelSpan.textContent = label;
    item.appendChild(labelSpan);

    const valueSpan = document.createElement('span');
    valueSpan.classList.add('title-case');
    valueSpan.textContent = ' ' + value + ' ';
    item.appendChild(valueSpan);

    return item;
  }

  function renderGrid(data, container) {
    renderGridShared(data, container, {
        wrapperClass: 'col-lg-4 col-md-6 mb-4 marketplace-item-wrapper',
        cardClass: 'marketplace-card',
        getImageUrl: (item) => item.image,
        getLinkUrl: (item) => item.url,
        getSubtitle: (item) => item.subtitle,
        renderTitleExtra: (item, titleContainer) => {
            const sBadge = document.createElement('span');
            sBadge.classList.add('service-badge');
            sBadge.textContent = item.service || uiStrings.fallback;
            titleContainer.appendChild(sBadge);
        },
        renderFooter: (item, footer) => {
            let btnText = uiStrings.launch;
            let platformIcon = 'fas fa-globe';
            let platformDisplay = item.platform || uiStrings.fallback;

            if (item.platform && (item.platform.toLowerCase() === 'pwa' || item.platform.toLowerCase() === 'web app')) {
                platformDisplay = uiStrings.webapp;
                platformIcon = 'fas fa-globe';
                btnText = uiStrings.launch;
            } else if (item.platform === 'android') {
                btnText = uiStrings.download;
                platformIcon = 'fab fa-android';
            } else if (item.platform === 'github') {
                btnText = uiStrings.build;
                platformIcon = 'fab fa-github';
            }

            const serviceIcon = serviceIcons[item.service] || 'fas fa-shopping-cart';
            const displayCategories = Array.isArray(item.categories) ? item.categories.join(", ") : (item.categories || uiStrings.fallback);

            const meta = document.createElement('div');
            meta.classList.add('marketplace-meta');
            meta.appendChild(createMetaItem(platformIcon, uiStrings.platform, platformDisplay));
            meta.appendChild(createMetaItem('fas fa-tag', uiStrings.category, displayCategories));
            meta.appendChild(createMetaItem(serviceIcon, uiStrings.service, (item.service || uiStrings.fallback).toLowerCase()));
            footer.appendChild(meta);

            const controls = document.createElement('div');
            controls.classList.add('d-flex', 'justify-content-between', 'align-items-center');

            const detailsBtn = document.createElement('a');
            detailsBtn.href = item.url;
            detailsBtn.classList.add('btn', 'btn-outline-primary', 'btn-sm');
            detailsBtn.style.borderRadius = '20px';
            detailsBtn.textContent = uiStrings.viewDetails;
            controls.appendChild(detailsBtn);

            const actionBtn = document.createElement('a');
            actionBtn.classList.add('btn', 'btn-primary', 'btn-install');
            actionBtn.textContent = btnText;
            actionBtn.setAttribute('aria-label', `${btnText} ${item.title}`);

            if (!item.platform || item.platform.toLowerCase() === 'pwa' || item.platform.toLowerCase() === 'web app') {
                actionBtn.href = 'javascript:void(0)';
                actionBtn.classList.add('launch-trigger');
                actionBtn.setAttribute('data-link', item.link);
            } else {
                actionBtn.href = item.link;
                actionBtn.target = '_blank';
                actionBtn.rel = 'noopener noreferrer';
            }
            controls.appendChild(actionBtn);
            footer.appendChild(controls);
        },
        renderShare: (item, body) => {
            const shareContainer = document.createElement('div');
            shareContainer.classList.add('mt-3', 'pt-3', 'border-top', 'd-flex', 'justify-content-center');

            const shareBtn = document.createElement('button');
            shareBtn.classList.add('btn', 'btn-link', 'btn-sm', 'text-muted', 'mx-2');
            shareBtn.innerHTML = '<i class="fas fa-share-alt mr-1"></i> ' + uiStrings.share;
            shareBtn.setAttribute('aria-label', `Share ${item.title}`);
            shareBtn.addEventListener('click', () => {
                if (navigator.share) {
                    navigator.share({
                        title: item.title,
                        text: item.subtitle,
                        url: window.location.origin + item.url
                    }).catch(console.error);
                } else {
                    navigator.clipboard.writeText(window.location.origin + item.url).then(() => {
                        const originalText = shareBtn.innerHTML;
                        shareBtn.innerHTML = '<i class="fas fa-check mr-1"></i> ' + uiStrings.copied;
                        setTimeout(() => shareBtn.innerHTML = originalText, 2000);
                    }).catch(console.error);
                }
            });
            shareContainer.appendChild(shareBtn);

            const copyBtn = document.createElement('button');
            copyBtn.classList.add('btn', 'btn-link', 'btn-sm', 'text-muted', 'mx-2');
            copyBtn.innerHTML = '<i class="fas fa-copy mr-1"></i>';
            copyBtn.setAttribute('aria-label', `Copy link to ${item.title}`);
            copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(window.location.origin + item.url).then(() => {
                    const originalText = copyBtn.innerHTML;
                    copyBtn.innerHTML = '<i class="fas fa-check mr-1"></i>';
                    setTimeout(() => copyBtn.innerHTML = originalText, 2000);
                });
            });
            shareContainer.appendChild(copyBtn);

            body.appendChild(shareContainer);
        }
    });
  }

  function filterAndSort() {
    const searchTerm = document.getElementById('marketplace-search').value.toLowerCase();
    const service = document.getElementById('service-filter').value;
    const sortBy = document.getElementById('sort-by').value;

    let filtered = marketplaceData.filter(item => {
      const matchesSearch = (item.title && item.title.toLowerCase().includes(searchTerm)) ||
                           (item.subtitle && item.subtitle.toLowerCase().includes(searchTerm)) ||
                           (item.platform && item.platform.toLowerCase().includes(searchTerm)) ||
                           (item.service && item.service.toLowerCase().includes(searchTerm)) ||
                           (item.programTitle && item.programTitle.toLowerCase().includes(searchTerm)) ||
                           (Array.isArray(item.categories) ? item.categories.some(c => c && c.toLowerCase().includes(searchTerm)) : (item.categories && item.categories.toLowerCase().includes(searchTerm))) ||
                           (Array.isArray(item.tags) ? item.tags.some(t => t && t.toLowerCase().includes(searchTerm)) : (item.tags && item.tags.toLowerCase().includes(searchTerm)));
      const matchesService = service === 'all' || item.service === service;
      return matchesSearch && matchesService;
    });

    if (sortBy === 'alpha') {
      filtered.sort((a, b) => a.title.localeCompare(b.title));
    } else {
      filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    const noResultsMsg = document.getElementById('no-results-message');
    const container = document.getElementById('marketplace-container');
    if (filtered.length === 0) {
      noResultsMsg.style.display = 'block';
      container.innerHTML = '';
    } else {
      noResultsMsg.style.display = 'none';
      renderGrid(filtered, container);
    }
  }

  document.getElementById('marketplace-search').addEventListener('input', debounce(filterAndSort, 300));
  document.getElementById('service-filter').addEventListener('change', filterAndSort);
  document.getElementById('sort-by').addEventListener('change', filterAndSort);

  document.getElementById('clear-filters').addEventListener('click', function() {
    document.getElementById('marketplace-search').value = '';
    document.getElementById('service-filter').value = 'all';
    document.getElementById('sort-by').value = 'recent';
    filterAndSort();
  });

  document.getElementById('marketplace-container').addEventListener('click', function(e) {
    if (e.target.classList.contains('launch-trigger')) {
      handleLaunch(e.target.getAttribute('data-link'));
    }
  });

  // Handle initial filter from hash or window property
  const hash = window.location.hash ? decodeURIComponent(window.location.hash.substring(1)) : null;
  if (hash) {
      const serviceFilter = document.getElementById('service-filter');
      for (let i = 0; i < serviceFilter.options.length; i++) {
          if (serviceFilter.options[i].value === hash) {
              serviceFilter.value = hash;
              break;
          }
      }
  } else if (window.defaultFilter) {
      document.getElementById('service-filter').value = window.defaultFilter;
  }

  // Initial render
  filterAndSort();

  window.addEventListener('hashchange', function() {
      const newHash = decodeURIComponent(window.location.hash.substring(1));
      if (newHash) {
          const serviceFilter = document.getElementById('service-filter');
          for (let i = 0; i < serviceFilter.options.length; i++) {
              if (serviceFilter.options[i].value === newHash) {
                  serviceFilter.value = newHash;
                  filterAndSort();
                  break;
              }
          }
      }
  });
</script>
