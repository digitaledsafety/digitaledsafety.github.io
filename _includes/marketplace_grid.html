<style>
  .marketplace-card {
    border: none;
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    overflow: hidden;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: #fff;
  }
  .marketplace-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  }
  .marketplace-img-container {
    position: relative;
    width: 100%;
    padding-top: 60%; /* 5:3 Aspect Ratio */
    overflow: hidden;
    background: #f8f9fa;
  }
  .marketplace-img-container img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .marketplace-body {
    padding: 1.5rem;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
  }
  .marketplace-title {
    font-weight: 700;
    font-size: 1.25rem;
    margin-bottom: 0.5rem;
    color: #333;
  }
  .marketplace-subtitle {
    font-size: 0.9rem;
    color: #666;
    margin-bottom: 1rem;
    flex-grow: 1;
  }
  .marketplace-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: auto;
  }
  .btn-install {
    border-radius: 50px;
    padding: 0.5rem 1.5rem;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.8rem;
    transition: all 0.2s;
  }
  .platform-badge {
    font-size: 0.7rem;
    padding: 0.3rem 0.6rem;
    border-radius: 10px;
    background: #e9ecef;
    color: #495057;
    font-weight: 600;
    text-transform: uppercase;
  }
</style>

<div class="row mb-4">
  <div class="col-md-4">
    <div class="input-group">
      <div class="input-group-prepend">
        <span class="input-group-text"><i class="fa fa-search"></i></span>
      </div>
      <input type="text" id="marketplace-search" class="form-control" placeholder="Search...">
    </div>
  </div>
  <div class="col-md-3">
    <select id="platform-filter" class="form-control">
      <option value="all">All Platforms</option>
      <option value="pwa">PWA</option>
      <option value="android">Android</option>
      <option value="github">GitHub</option>
    </select>
  </div>
  <div class="col-md-3">
    <select id="category-filter" class="form-control">
      <option value="all">All Categories</option>
      <option value="apps">Apps</option>
      <option value="games">Games</option>
      <option value="tools">Tools</option>
    </select>
  </div>
  <div class="col-md-2">
    <select id="sort-by" class="form-control">
      <option value="recent">Recently Added</option>
      <option value="alpha">Alphabetical</option>
    </select>
  </div>
</div>

<div class="row" id="marketplace-container">
  <!-- Marketplace items will be injected here -->
</div>

<script>
  const marketplaceData = [
    {% for item in site.marketplace %}
    {
      "title": {{ item.title | jsonify }},
      "subtitle": {{ item.subtitle | jsonify }},
      "image": {{ item.image | jsonify }},
      "link": {{ item.link | jsonify }},
      "platform": {{ item.platform | default: "pwa" | jsonify }},
      "categories": {{ item.categories | jsonify }},
      "date": {{ item.date | jsonify }},
      "tags": {{ item.tags | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  function renderMarketplace(data) {
    const container = document.getElementById('marketplace-container');
    container.innerHTML = '';

    data.forEach(item => {
      let btnText = 'Open';
      let icon = 'fa-globe';

      if (item.platform === 'android') {
        btnText = 'Download';
        icon = 'fa-android';
      } else if (item.platform === 'github') {
        btnText = 'Build';
        icon = 'fa-github';
      }

      const html = `
        <div class="col-lg-4 col-md-6 mb-4 marketplace-item-wrapper">
          <div class="card marketplace-card">
            <div class="marketplace-img-container">
              <img src="${item.image}" alt="${item.title}">
            </div>
            <div class="marketplace-body">
              <div class="d-flex justify-content-between align-items-start">
                <h5 class="marketplace-title">${item.title}</h5>
                <span class="platform-badge"><i class="fa ${icon}"></i> ${item.platform}</span>
              </div>
              <p class="marketplace-subtitle">${item.subtitle}</p>
              <div class="marketplace-footer">
                <a href="${item.link}" target="_blank" class="btn btn-primary btn-install">${btnText}</a>
              </div>
            </div>
          </div>
        </div>
      `;
      container.innerHTML += html;
    });
  }

  function filterAndSort() {
    const searchTerm = document.getElementById('marketplace-search').value.toLowerCase();
    const platform = document.getElementById('platform-filter').value;
    const category = document.getElementById('category-filter').value;
    const sortBy = document.getElementById('sort-by').value;

    let filtered = marketplaceData.filter(item => {
      const matchesSearch = item.title.toLowerCase().includes(searchTerm) ||
                           item.subtitle.toLowerCase().includes(searchTerm);
      const matchesPlatform = platform === 'all' || item.platform === platform;
      const matchesCategory = category === 'all' || (item.categories && item.categories.includes(category));
      return matchesSearch && matchesPlatform && matchesCategory;
    });

    if (sortBy === 'alpha') {
      filtered.sort((a, b) => a.title.localeCompare(b.title));
    } else {
      filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    renderMarketplace(filtered);
  }

  document.getElementById('marketplace-search').addEventListener('input', filterAndSort);
  document.getElementById('platform-filter').addEventListener('change', filterAndSort);
  document.getElementById('category-filter').addEventListener('change', filterAndSort);
  document.getElementById('sort-by').addEventListener('change', filterAndSort);

  // Initial render
  filterAndSort();
</script>
