<div class="hero-actions">
  {% if page.platform == 'android' %}
    <a href="{{ page.link }}" target="_blank" class="btn {{ include.size | default: 'btn-md' }} btn-primary shadow-sm px-4 py-2" style="border-radius: 30px;">
      <i class="fab fa-android mr-2"></i> {{ ui_data.download_btn | default: "Download" }}
    </a>
  {% elsif page.platform == 'github' %}
    <a href="{{ page.link }}" target="_blank" class="btn {{ include.size | default: 'btn-md' }} btn-primary shadow-sm px-4 py-2" style="border-radius: 30px;">
      <i class="fab fa-github mr-2"></i> {{ ui_data.build_btn | default: "Build" }}
    </a>
  {% else %}
    <a href="javascript:void(0)" onclick="handleLaunch('{{ page.link }}')" class="btn {{ include.size | default: 'btn-md' }} btn-primary launch-trigger shadow-sm px-4 py-2" data-link="{{ page.link }}" style="border-radius: 30px;">
      <i class="fas fa-rocket mr-2"></i> {{ ui_data.launch_btn | default: "Launch" }} {{ ui_data.webapp | default: "Web App" }}
    </a>
  {% endif %}
</div>
