{% assign strings = site.data.sitetext[site.locale].donation_modal %}
<style>
  #donationModal .modal-content {
    border-radius: 20px;
    border: none;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  #donationModal .modal-header {
    border-bottom: none;
    padding-top: 2rem;
  }
  #donationModal .modal-title {
    font-weight: 700;
    color: #333;
    width: 100%;
    text-align: center;
    font-size: 1.5rem;
  }
  #donationModal .modal-body {
    padding: 1rem 2rem 2rem;
  }
  #donationModal .btn-primary {
    border-radius: 50px;
    padding: 0.75rem 2rem;
    font-weight: 700;
    text-transform: uppercase;
    background-color: #fed136;
    border-color: #fed136;
    color: #fff;
  }
  #donationModal .btn-primary:hover {
    background-color: #fec503;
    border-color: #fec503;
  }
  #donationModal .btn-link {
    font-size: 0.9rem;
    text-decoration: none;
  }
  #donationModal .heart-icon {
    color: #e74c3c;
    font-size: 3rem;
    margin-bottom: 1rem;
  }
</style>

<div class="modal fade" id="donationModal" tabindex="-1" role="dialog" aria-labelledby="donationModalLabel" aria-hidden="true" style="z-index: 1051;">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="donationModalLabel">{{ strings.title }}</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close" style="position: absolute; right: 1.5rem; top: 1.5rem;">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body text-center">
        <div id="donation-prompt">
          <div class="heart-icon"><i class="fas fa-heart"></i></div>
          <p class="lead mb-4">{{ strings.text }}</p>
          <div id="paypal-button-container-marketplace" class="my-4" style="min-height: 150px;">
            <div id="paypal-fallback" class="text-center">
              <form action="https://www.paypal.com/donate" method="post" target="_blank">
                <input type="hidden" name="hosted_button_id" value="EYCLH7HV8NEGA" />
                <button type="submit" class="btn btn-primary btn-lg mb-3">{{ strings.donate_btn }}</button>
              </form>
            </div>
          </div>
          <button type="button" class="btn btn-link text-muted" id="launch-anyway-btn">{{ strings.launch_anyway }}</button>
        </div>
        <div id="thank-you-message" style="display: none;">
          <div class="heart-icon"><i class="fas fa-check-circle text-success"></i></div>
          <h4 class="text-success mb-3">{{ strings.thank_you_title }}</h4>
          <p class="mb-4">{{ strings.thank_you_text }}</p>
          <button type="button" class="btn btn-primary" id="continue-to-app-btn">{{ strings.continue_btn }}</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    let pendingLaunchUrl = '';

    function resetDonationModal() {
      const prompt = document.getElementById('donation-prompt');
      const thankYou = document.getElementById('thank-you-message');
      if (prompt) prompt.style.display = 'block';
      if (thankYou) thankYou.style.display = 'none';
    }

    window.handleLaunch = function(url) {
      resetDonationModal();
      if (localStorage.getItem('hasDonated')) {
        window.open(url, '_blank');
      } else {
        pendingLaunchUrl = url;
        $('#donationModal').modal('show');
        renderPaypalButton();
      }
    };

    function renderPaypalButton() {
      const container = document.getElementById('paypal-button-container-marketplace');
      if (!container || container.innerHTML !== '') return;

      if (window.paypal) {
        paypal.Buttons({
          style: {
            layout: 'vertical',
            color:  'gold',
            shape:  'rect',
            label:  'paypal'
          },
          createOrder: function(data, actions) {
            return actions.order.create({
              purchase_units: [{
                amount: {
                  currency_code: '{{ site.paypal_currency | default: "USD" }}',
                  value: '1.00'
                },
                description: 'Support Our Mission - Marketplace Donation'
              }]
            });
          },
          onInit: function(data, actions) {
            // Hide fallback when SDK buttons are ready
            document.getElementById('paypal-fallback').style.display = 'none';
          },
          onApprove: function(data, actions) {
            return actions.order.capture().then(function(details) {
              localStorage.setItem('hasDonated', 'true');
              document.getElementById('donation-prompt').style.display = 'none';
              document.getElementById('thank-you-message').style.display = 'block';

              // Report conversion if gtag is available
              if (typeof gtag === 'function') {
                gtag('event', 'conversion', {'send_to': "{{ site.ads.google }}/oNtiCNf78sAaEJfMq48_"});
              }
            });
          }
        }).render('#paypal-button-container-marketplace');
      } else {
        setTimeout(renderPaypalButton, 500);
      }
    }

    document.getElementById('launch-anyway-btn').addEventListener('click', function() {
      $('#donationModal').modal('hide');
      if (pendingLaunchUrl) {
        window.open(pendingLaunchUrl, '_blank');
        pendingLaunchUrl = '';
      }
    });

    document.getElementById('continue-to-app-btn').addEventListener('click', function() {
      $('#donationModal').modal('hide');
      if (pendingLaunchUrl) {
        window.open(pendingLaunchUrl, '_blank');
        pendingLaunchUrl = '';
      }
    });

    // Reset modal state when closed. We use a combination of reset-on-launch
    // and a deferred jQuery listener to ensure state is always clean.
    window.addEventListener('load', function() {
      if (window.jQuery) {
        $('#donationModal').on('hidden.bs.modal', resetDonationModal);
      }
    });
  })();
</script>
